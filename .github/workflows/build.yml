name: Build APK

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle 8.10.2
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.10.2

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p artifact
          REF_NAME_SAFE="${GITHUB_REF_NAME//\//-}"
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            NAME="auto-answer-${GITHUB_REF_NAME}.apk"
          else
            NAME="auto-answer-${REF_NAME_SAFE}-${GITHUB_SHA::7}.apk"
          fi
          cp app/build/outputs/apk/debug/app-debug.apk "artifact/${NAME}"
          echo "APK_PATH=artifact/${NAME}" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: auto-answer-apk
          path: artifact/*.apk
          retention-days: 90
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: auto-answer-apk
          path: ./artifact

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            ./artifact/*.apk
